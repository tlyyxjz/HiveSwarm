<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>HiveSwarm 实时战况</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0f;color:#c0c0d0;font-family:Consolas,monospace;padding:20px}
h1{color:#06b6d4;font-size:1.3em;margin-bottom:10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#12121a;border:1px solid #1e1e2e;border-radius:8px;padding:14px}
.card h2{font-size:.8em;color:#64748b;margin-bottom:8px;text-transform:uppercase;letter-spacing:.1em}
.agent{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.85em}
.dot{width:8px;height:8px;border-radius:50%}.green{background:#22c55e;box-shadow:0 0 6px #22c55e}
.yellow{background:#eab308;box-shadow:0 0 6px #eab308}.white{background:#64748b}
.flag{background:#1a1212;border-left:3px solid #ef4444;padding:6px 10px;margin:4px 0;font-size:.8em;border-radius:4px}
.flag.crit{border-color:#dc2626}.flag.high{border-color:#f97316}.flag.med{border-color:#eab308}
.metric{font-size:1.6em;font-weight:bold} .good{color:#22c55e}.warn{color:#eab308}.bad{color:#ef4444}
.bar{height:4px;background:#1e1e2e;border-radius:2px;margin-top:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .5s}
.bar-fill.green{background:#22c55e}.bar-fill.yellow{background:#eab308}.bar-fill.red{background:#ef4444}
.pi-status{font-size:.85em;padding:8px;border-radius:6px;margin-top:8px}
.pi-status.ok{background:#0a1a0a;color:#22c55e}.pi-status.warn{background:#1a1a0a;color:#eab308}
.pi-status.block{background:#1a0a0a;color:#ef4444} </style></head>
<body><h1>HiveSwarm 实时战况</h1><p style="color:#64748b;margin-bottom:12px">更新: 11:49:59 | 刷新浏览器更新</p>

(function(){var a=D.agents||[],q=D.queue||[],d=D.done||[];
