# 本地开发 provider 配置 — 仅在 [local] enabled = true 时加载
#
# 用法:
#   1. 公司版: 不要 include 这个文件（蜂巢默认不启用本地 provider）
#   2. 开发版: 在 default.toml 设 [local] enabled = true, 然后 include 这文件
#   3. 单文件启动: python -m src.main --config config/providers.local.toml
#
# Ollama 启停:
#   ollama serve               # 后台启动
#   ollama pull qwen3:8b       # 拉对话模型
#   ollama pull bge-m3         # 拉嵌入模型

# ── Ollama provider（仅 dev 环境用）───────────────────────────────

[[providers]]
name = "ollama-local"
type = "ollama"
base_url = "http://127.0.0.1:11434"
model = "qwen3:8b"
api_key = ""
tier = "free"
description = "本地 Ollama — 开发/调试用,公司版禁用"

# ── 嵌入模型（dev 默认用 bge-m3）───────────────────────────────

[brain]
active_provider = "ollama-local"
embedding_provider = "ollama-local"
embedding_model = "bge-m3:latest"

# ── 本地开关：true 才加载此文件 ─────────────────────────────────
[local]
enabled = true
data_dir = "~/.hiveswarm/local"