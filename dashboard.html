.bar-fill{height:100%;border-radius:2px;transition:width .5s}
.bar-fill.green{background:#22c55e}.bar-fill.yellow{background:#eab308}.bar-fill.red{background:#ef4444}
.pi-status{font-size:.85em;padding:8px;border-radius:6px;margin-top:8px}
.pi-status.ok{background:#0a1a0a;color:#22c55e}.pi-status.warn{background:#1a1a0a;color:#eab308}
